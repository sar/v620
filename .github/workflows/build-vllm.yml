name: Build vLLM ROCm gfx1030

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual triggering from the Actions tab

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/vllm-gfx1030
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Opt-into Node 24 to suppress deprecation warnings

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free up disk space (~30GB reclaimed)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false       # keep tool-cache (actions need it)
          android: true           # ~10GB
          dotnet: true            # ~3GB
          haskell: true           # ~5GB
          large-packages: true    # azure-cli, google-cloud-sdk, etc. ~10GB
          docker-images: true     # pre-pulled images ~3GB
          swap-storage: true      # ~4GB swap file

      - name: Additional disk scrub
        run: |
          sudo rm -rf /usr/local/lib/node_modules /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/share/swift
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo apt-get purge -y -f 'llvm-*' 'mono-*' 'php*'
          sudo apt-get autoremove -y
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./vllm/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max